<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Faraone profile header</title>
  <desc id="desc">Animated header for a GitHub profile README focused on low-latency systems engineering.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060609"/>
      <stop offset="0.55" stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#101018"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="40" x2="1040" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.45" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <mask id="scanMask">
      <rect width="1200" height="320" fill="black"/>
      <rect x="-300" y="0" width="300" height="320" fill="white">
        <animate attributeName="x" values="-300;1200" dur="6s" repeatCount="indefinite"/>
      </rect>
    </mask>
    <style>
      .pulse { animation: pulse 4s ease-in-out infinite; }
      .floatA { animation: floatA 7s ease-in-out infinite; }
      .floatB { animation: floatB 9s ease-in-out infinite; }
      .blink { animation: blink 1.2s steps(1, end) infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.28; }
        50% { opacity: 0.52; }
      }
      @keyframes floatA {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes floatB {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(10px); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      text {
        font-family: 'Segoe UI', Arial, sans-serif;
      }
    </style>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>

  <rect width="1200" height="320" rx="24" fill="url(#accent)" fill-opacity="0.04"/>

  <g class="pulse" filter="url(#softGlow)">
    <circle cx="920" cy="76" r="88" fill="#7C3AED" fill-opacity="0.16"/>
    <circle cx="1060" cy="248" r="124" fill="#0EA5E9" fill-opacity="0.12"/>
  </g>

  <g mask="url(#scanMask)">
    <rect x="0" y="0" width="1200" height="320" fill="url(#line)" fill-opacity="0.12"/>
  </g>

  <g class="floatA" opacity="0.9">
    <path d="M760 96H1090" stroke="url(#line)" stroke-width="2"/>
    <path d="M760 136H1140" stroke="url(#line)" stroke-width="2"/>
    <path d="M760 176H1030" stroke="url(#line)" stroke-width="2"/>
    <path d="M760 216H1110" stroke="url(#line)" stroke-width="2"/>
  </g>

  <g class="floatB" opacity="0.6">
    <rect x="760" y="89" width="12" height="12" rx="2" fill="#8B5CF6"/>
    <rect x="915" y="129" width="12" height="12" rx="2" fill="#6366F1"/>
    <rect x="1048" y="169" width="12" height="12" rx="2" fill="#38BDF8"/>
    <rect x="820" y="209" width="12" height="12" rx="2" fill="#60A5FA"/>
  </g>

  <g>
    <text x="72" y="108" font-size="22" font-weight="600" fill="#A78BFA">FARAONE</text>
    <text x="72" y="162" font-size="56" font-weight="800" fill="#FFFFFF">LOW-LATENCY SYSTEMS</text>
    <text x="72" y="214" font-size="56" font-weight="800" fill="url(#accent)">EXECUTION + SECURITY</text>
    <text x="72" y="258" font-size="24" font-weight="500" fill="#B8B8C7">
      Rust / C++ / Zig / Go  •  deterministic engines  •  benchmark-driven engineering
    </text>
    <text x="72" y="291" font-size="22" font-weight="600" fill="#7DD3FC">
      &gt; public proof over hype<tspan class="blink">_</tspan>
    </text>
  </g>
</svg>